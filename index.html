<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake On-Chain | Base</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 { font-size: 1.8rem; margin-bottom: 4px; color: #00ff88; letter-spacing: 2px; }
  .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 20px; }
  .info-bar { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
  .info-box { background: #111; border: 1px solid #222; border-radius: 10px; padding: 8px 18px; text-align: center; }
  .info-box .label { font-size: 11px; color: #555; margin-bottom: 2px; }
  .info-box .value { font-size: 1.2rem; font-weight: bold; color: #00ff88; }
  #canvas { border: 2px solid #1a1a2e; border-radius: 8px; background: #060610; display: block; }
  .controls { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; justify-content: center; }
  button { padding: 10px 22px; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
  button:hover { opacity: 0.85; }
  #btnConnect { background: #3b82f6; color: #fff; }
  #btnStart { background: #00ff88; color: #000; }
  #btnSubmit { background: #f59e0b; color: #000; display: none; }
  .wallet-addr { font-size: 11px; color: #444; margin-top: 8px; text-align: center; }
  #leaderboard { margin-top: 24px; width: 100%; max-width: 420px; background: #111; border: 1px solid #1e1e2e; border-radius: 12px; padding: 16px; }
  #leaderboard h3 { font-size: 1rem; color: #00ff88; margin-bottom: 12px; text-align: center; }
  .lb-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { color: #555; width: 24px; }
  .lb-addr { color: #888; flex: 1; padding: 0 8px; }
  .lb-score { color: #00ff88; font-weight: bold; }
  .msg { margin-top: 12px; font-size: 13px; color: #f59e0b; text-align: center; min-height: 20px; }
  .dpad { display: grid; grid-template-columns: repeat(3, 48px); grid-template-rows: repeat(3, 48px); gap: 4px; margin-top: 16px; }
  .dpad button { width: 48px; height: 48px; padding: 0; background: #1a1a2e; color: #fff; font-size: 1.2rem; border-radius: 8px; }
  @media (min-width: 600px) { .dpad { display: none; } }
</style>
</head>
<body>

<h1>🐍 Snake On-Chain</h1>
<p class="subtitle">بازی کن، امتیاز بگیر، روی Base ثبت کن</p>

<div class="info-bar">
  <div class="info-box"><div class="label">امتیاز</div><div class="value" id="scoreDisplay">0</div></div>
  <div class="info-box"><div class="label">بهترین</div><div class="value" id="bestDisplay">0</div></div>
  <div class="info-box"><div class="label">وضعیت</div><div class="value" id="statusDisplay" style="font-size:0.9rem;color:#666;">آماده</div></div>
</div>

<canvas id="canvas" width="400" height="400"></canvas>

<div class="dpad">
  <div></div>
  <button onclick="changeDir(0,-1)">▲</button>
  <div></div>
  <button onclick="changeDir(-1,0)">◄</button>
  <div></div>
  <button onclick="changeDir(1,0)">►</button>
  <div></div>
  <button onclick="changeDir(0,1)">▼</button>
  <div></div>
</div>

<div class="controls">
  <button id="btnConnect" onclick="connectWallet()">اتصال کیف‌پول</button>
  <button id="btnStart" onclick="startGame()">شروع بازی</button>
  <button id="btnSubmit" onclick="submitScore()">ثبت امتیاز روی Base</button>
</div>

<div class="wallet-addr" id="walletAddr"></div>
<div class="msg" id="msg"></div>

<div id="leaderboard">
  <h3>🏆 لیدربورد آنچین</h3>
  <div id="lbList"><div style="color:#444;text-align:center;font-size:13px;">بعد از اتصال کیف‌پول لیدربورد نمایش داده میشه</div></div>
</div>

<script>
const CONTRACT_ADDRESS = "0xa654c6b446c7CCF4466d8a61465405b9e77462A9";

const GRID = 20;
const CELL = 20;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let snake, dir, food, score, gameLoop, gameOver, walletAddress, lastScore;

function initGame() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1, y:0};
  score = 0;
  gameOver = false;
  placeFood();
  updateDisplay();
}

function placeFood() {
  do {
    food = {x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID)};
  } while (snake.some(s => s.x===food.x && s.y===food.y));
}

function changeDir(dx, dy) {
  if (dx !== -dir.x || dy !== -dir.y) dir = {x:dx, y:dy};
}

function updateDisplay() {
  document.getElementById('scoreDisplay').textContent = score;
  if (score > parseInt(document.getElementById('bestDisplay').textContent)) {
    document.getElementById('bestDisplay').textContent = score;
  }
}

function draw() {
  ctx.fillStyle = '#060610';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = '#0d0d1a';
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(canvas.width,i*CELL); ctx.stroke();
  }

  snake.forEach((seg, i) => {
    ctx.fillStyle = i===0 ? '#00ff88' : `hsl(${140+i*2}, 80%, ${45-i*0.5}%)`;
    ctx.beginPath();
    ctx.roundRect(seg.x*CELL+1, seg.y*CELL+1, CELL-2, CELL-2, 3);
    ctx.fill();
  });

  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2);
  ctx.fill();

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 28px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('Game Over!', canvas.width/2, canvas.height/2 - 20);
    ctx.fillStyle = '#00ff88';
    ctx.font = '18px Segoe UI';
    ctx.fillText('امتیاز: ' + score, canvas.width/2, canvas.height/2 + 15);
    ctx.fillStyle = '#888';
    ctx.font = '13px Segoe UI';
    ctx.fillText('برای ثبت روی بلاکچین، دکمه پایین رو بزن', canvas.width/2, canvas.height/2 + 45);
    ctx.textAlign = 'left';
  }
}

function tick() {
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x<0||head.x>=GRID||head.y<0||head.y>=GRID||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    gameOver = true;
    clearInterval(gameLoop);
    lastScore = score;
    if (walletAddress) document.getElementById('btnSubmit').style.display = 'inline-block';
    setMsg('بازی تموم شد! امتیاز: ' + score + ' — حالا ثبتش کن روی Base 🔵');
    draw();
    return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) { score += 10; updateDisplay(); placeFood(); }
  else snake.pop();
  draw();
}

function startGame() {
  clearInterval(gameLoop);
  document.getElementById('btnSubmit').style.display = 'none';
  setMsg('');
  initGame();
  draw();
  gameLoop = setInterval(tick, 120);
  document.getElementById('statusDisplay').textContent = '▶ بازی';
  document.getElementById('statusDisplay').style.color = '#00ff88';
}

document.addEventListener('keydown', e => {
  if (e.key==='ArrowUp') changeDir(0,-1);
  else if (e.key==='ArrowDown') changeDir(0,1);
  else if (e.key==='ArrowLeft') changeDir(-1,0);
  else if (e.key==='ArrowRight') changeDir(1,0);
});

async function connectWallet() {
  if (!window.ethereum) { setMsg('MetaMask نصب نیست!'); return; }
  try {
    const accounts = await window.ethereum.request({method:'eth_requestAccounts'});
    walletAddress = accounts[0];
    const chainId = await window.ethereum.request({method:'eth_chainId'});
    if (chainId !== '0x2105') {
      try {
        await window.ethereum.request({method:'wallet_switchEthereumChain', params:[{chainId:'0x2105'}]});
      } catch {
        setMsg('لطفاً شبکه Base رو توی MetaMask انتخاب کن');
        return;
      }
    }
    document.getElementById('walletAddr').textContent = 'متصل: ' + walletAddress.slice(0,6)+'...'+walletAddress.slice(-4);
    document.getElementById('btnConnect').textContent = '✓ متصل';
    document.getElementById('btnConnect').style.background = '#1a3a2a';
    document.getElementById('btnConnect').style.color = '#00ff88';
    setMsg('کیف‌پول وصل شد! حالا بازی کن 🎮');
  } catch(e) { setMsg('خطا در اتصال: ' + e.message); }
}

async function submitScore() {
  if (!walletAddress) { setMsg('اول کیف‌پول رو وصل کن'); return; }
  if (!lastScore || lastScore === 0) { setMsg('اول بازی کن و امتیاز بگیر!'); return; }
  try {
    setMsg('در حال ارسال به بلاکچین...');
    const scoreHex = BigInt(lastScore).toString(16).padStart(64, '0');
    const data = '0x4050a1d3' + scoreHex;
    const tx = await window.ethereum.request({
      method: 'eth_sendTransaction',
      params: [{
        from: walletAddress,
        to: CONTRACT_ADDRESS,
        data: data,
        gas: '0x30000'
      }]
    });
    setMsg('تراکنش ارسال شد! منتظر تایید... 🔵');
    document.getElementById('statusDisplay').textContent = '⏳ ثبت';
    document.getElementById('statusDisplay').style.color = '#f59e0b';
    setTimeout(() => {
      setMsg('امتیاز روی Base ثبت شد! ✅');
      document.getElementById('statusDisplay').textContent = '✓ ثبت شد';
      document.getElementById('statusDisplay').style.color = '#00ff88';
      document.getElementById('btnSubmit').style.display = 'none';
    }, 5000);
  } catch(e) {
    setMsg('خطا: ' + (e.message || 'کنسل شد'));
  }
}

function setMsg(m) { document.getElementById('msg').textContent = m; }

initGame();
draw();
</script>
</body>
</html>
